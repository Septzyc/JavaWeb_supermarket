<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超市收银台 POS</title>
    <!-- 使用 CDN 引入 Vue 3 + Element Plus -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }
        #app {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== 头部 ===== */
        .header {
            background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
            color: #fff;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
        }
        .header-left .subtitle {
            font-size: 12px;
            opacity: 0.7;
            background: rgba(255, 255, 255, 0.15);
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: normal;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-right .el-tag {
            color: #fff;
            border: none;
        }

        /* ===== 主体 ===== */
        .main {
            flex: 1;
            display: flex;
            gap: 16px;
            padding: 16px;
            overflow: hidden;
        }

        /* ===== 左侧面板 ===== */
        .left-panel {
            flex: 1;
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }
        .search-area {
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-area .el-input {
            flex: 1;
            min-width: 300px;
        }
        .hot-keys {
            display: flex;
            gap: 8px;
        }
        .product-list {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .product-list .el-table {
            flex: 1;
        }
        .pagination {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end;
        }

        /* ===== 右侧面板 ===== */
        .right-panel {
            width: 480px;
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f2f5;
        }
        .cart-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a3a5c;
        }
        .cart-list {
            flex: 1;
            overflow: hidden;
        }
        .cart-list .el-table {
            height: 100%;
        }
        .cart-total {
            border-top: 2px solid #f0f2f5;
            padding-top: 16px;
            margin-top: 12px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            margin-bottom: 12px;
        }
        .total-amount {
            font-size: 20px;
            font-weight: 700;
            color: #f56c6c;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        .action-buttons .el-button {
            flex: 1;
        }

        /* ===== 支付弹窗 ===== */
        .payment-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .payment-methods .el-button {
            height: 60px;
            font-size: 16px;
        }
        .payment-amount {
            text-align: center;
            font-size: 18px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .payment-amount strong {
            color: #f56c6c;
            font-size: 24px;
        }

        /* ===== 滚动条 ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c7cd;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8b0b8;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- 顶部 -->
    <div class="header">
        <div class="header-left">
            <span>🏪</span>
            <span>智慧超市收银系统</span>
            <span class="subtitle">POS v2.0</span>
        </div>
        <div class="header-right">
            <el-tag type="success">收银员：{{ username }}</el-tag>
            <el-tag type="info">工号：10086</el-tag>
            <el-button type="danger" size="small" @click="handleLogout">退出</el-button>
        </div>
    </div>

    <!-- 主体 -->
    <div class="main">
        <!-- 左侧 -->
        <div class="left-panel">
            <div class="search-area">
                <el-input v-model="searchKeyword" placeholder="扫码枪输入或搜索商品名称" size="large"
                          @input="handleSearch" @keyup.enter="handleAddBySearch">
                    <template #prefix>
                        <el-icon><Search /></el-icon>
                    </template>
                    <template #append>
                        <el-button type="primary" @click="handleAddBySearch">添加</el-button>
                    </template>
                </el-input>
                <div class="hot-keys">
                    <el-tag size="small">快捷键：F1 扫码</el-tag>
                    <el-tag size="small" type="warning">F2 挂单</el-tag>
                    <el-tag size="small" type="success">F3 结算</el-tag>
                </div>
            </div>

            <div class="product-list">
                <el-table :data="productList" height="520" @row-click="handleAddToCart">
                    <el-table-column prop="barcode" label="条码" width="120" />
                    <el-table-column prop="name" label="商品名称" min-width="150" />
                    <el-table-column prop="price" label="单价" width="100">
                        <template #default="{ row }">¥{{ row.price.toFixed(2) }}</template>
                    </el-table-column>
                    <el-table-column prop="stock" label="库存" width="80" />
                    <el-table-column label="操作" width="80">
                        <template #default="{ row }">
                            <el-button type="primary" size="small" @click.stop="handleAddToCart(row)">添加</el-button>
                        </template>
                    </el-table-column>
                </el-table>
                <div class="pagination">
                    <el-pagination v-model:current-page="currentPage" :page-size="10" :total="total" small
                                   @current-change="loadProducts" />
                </div>
            </div>
        </div>

        <!-- 右侧购物车 -->
        <div class="right-panel">
            <div class="cart-header">
                <span class="cart-title">当前购物车</span>
                <div>
                    <el-button size="small" @click="handleSuspend">挂单</el-button>
                    <el-button size="small" type="warning" @click="handleRecall">取单</el-button>
                    <el-button size="small" type="danger" @click="handleClearCart">清空</el-button>
                </div>
            </div>

            <div class="cart-list">
                <el-table :data="cartItems" height="380" stripe>
                    <el-table-column prop="name" label="商品" min-width="120" />
                    <el-table-column prop="price" label="单价" width="80">
                        <template #default="{ row }">¥{{ row.price.toFixed(2) }}</template>
                    </el-table-column>
                    <el-table-column prop="quantity" label="数量" width="140">
                        <template #default="{ row }">
                            <el-input-number v-model="row.quantity" :min="1" :max="row.stock || 999" size="small"
                                             @change="updateCart" />
                        </template>
                    </el-table-column>
                    <el-table-column prop="subtotal" label="小计" width="100">
                        <template #default="{ row }">¥{{ (row.price * row.quantity).toFixed(2) }}</template>
                    </el-table-column>
                    <el-table-column label="操作" width="60">
                        <template #default="{ row }">
                            <el-button type="danger" size="small" @click="handleRemoveFromCart(row)">×</el-button>
                        </template>
                    </el-table-column>
                </el-table>
            </div>

            <div class="cart-total">
                <div class="total-row">
                    <span>商品数量：<strong>{{ totalQuantity }}</strong> 件</span>
                    <span class="total-amount">合计：¥{{ totalAmount.toFixed(2) }}</span>
                </div>
                <div class="action-buttons">
                    <el-button type="primary" size="large" @click="handleCheckout">
                        💰 收银结账 (F3)
                    </el-button>
                </div>
            </div>
        </div>
    </div>

    <!-- 支付弹窗 -->
    <el-dialog v-model="paymentDialogVisible" title="选择支付方式" width="500px">
        <div class="payment-methods">
            <el-button type="success" size="large" @click="handlePay('现金')">💰 现金</el-button>
            <el-button type="primary" size="large" @click="handlePay('微信')">💬 微信支付</el-button>
            <el-button type="primary" size="large" @click="handlePay('支付宝')">💬 支付宝</el-button>
            <el-button type="warning" size="large" @click="handlePay('会员卡')">👤 会员卡</el-button>
        </div>
        <div class="payment-amount">
            应付金额：<strong>¥{{ totalAmount.toFixed(2) }}</strong>
        </div>
    </el-dialog>
</div>

<script>
    const { createApp, ref, computed, onMounted, onUnmounted } = Vue

    // ============================================================
    //  🔐 登录校验：检查是否已登录
    // ============================================================
    const isLoggedIn = localStorage.getItem('isLoggedIn')
    if (!isLoggedIn) {
        // 未登录，跳回登录页
        // 注意：这里的路径要根据你的项目名调整
        window.location.href = '/supermarket_web/pos/'
    }

    // ============================================================
    //  📦 创建 Vue 应用
    // ============================================================
    const app = createApp({
        setup() {
            // ===== 当前登录用户 =====
            const username = ref(localStorage.getItem('username') || '收银员')

            // ===== 数据 =====
            const searchKeyword = ref('')
            const productList = ref([])
            const currentPage = ref(1)
            const total = ref(0)
            const cartItems = ref([])
            const paymentDialogVisible = ref(false)

            // ===== Mock 数据 =====
            const mockProducts = [
                { id: 1, barcode: '690123456001', name: '蒙牛纯牛奶 250ml', price: 3.5, stock: 50 },
                { id: 2, barcode: '690123456002', name: '康师傅红烧牛肉面', price: 4.5, stock: 30 },
                { id: 3, barcode: '690123456003', name: '农夫山泉矿泉水 550ml', price: 2.0, stock: 100 },
                { id: 4, barcode: '690123456004', name: '奥利奥饼干 97g', price: 6.8, stock: 20 },
                { id: 5, barcode: '690123456005', name: '百事可乐 330ml', price: 3.0, stock: 45 },
                { id: 6, barcode: '690123456006', name: '清风抽纸 3包', price: 9.9, stock: 15 },
                { id: 7, barcode: '690123456007', name: '德芙巧克力 43g', price: 8.5, stock: 25 },
                { id: 8, barcode: '690123456008', name: '旺旺雪饼 84g', price: 5.5, stock: 18 },
            ]

            // ===== 计算属性 =====
            const totalQuantity = computed(() => {
                return cartItems.value.reduce((sum, item) => sum + item.quantity, 0)
            })
            const totalAmount = computed(() => {
                return cartItems.value.reduce((sum, item) => sum + item.price * item.quantity, 0)
            })

            // ===== 方法 =====
            const loadProducts = () => {
                const start = (currentPage.value - 1) * 10
                const end = start + 10
                productList.value = mockProducts.slice(start, end)
                total.value = mockProducts.length
            }

            const handleSearch = () => {
                const keyword = searchKeyword.value.trim().toLowerCase()
                if (!keyword) {
                    loadProducts()
                    return
                }
                productList.value = mockProducts.filter(p =>
                    p.name.includes(keyword) || p.barcode.includes(keyword)
                )
                total.value = productList.value.length
            }

            const handleAddBySearch = () => {
                const keyword = searchKeyword.value.trim()
                if (!keyword) {
                    ElementPlus.ElMessage.warning('请输入条码或商品名称')
                    return
                }
                const product = mockProducts.find(p =>
                    p.barcode === keyword || p.name === keyword
                )
                if (product) {
                    handleAddToCart(product)
                    searchKeyword.value = ''
                } else {
                    ElementPlus.ElMessage.error('未找到该商品，请确认条码或名称')
                }
            }

            const handleAddToCart = (product) => {
                const existing = cartItems.value.find(item => item.id === product.id)
                if (existing) {
                    existing.quantity++
                } else {
                    cartItems.value.push({ ...product, quantity: 1 })
                }
                ElementPlus.ElMessage.success(`已添加：${product.name}`)
            }

            const handleRemoveFromCart = (item) => {
                const index = cartItems.value.indexOf(item)
                if (index > -1) {
                    cartItems.value.splice(index, 1)
                    ElementPlus.ElMessage.info('已移除')
                }
            }

            const handleClearCart = () => {
                ElementPlus.ElMessageBox.confirm('确认清空购物车？', '提示', {
                    confirmButtonText: '确认',
                    cancelButtonText: '取消',
                    type: 'warning'
                }).then(() => {
                    cartItems.value = []
                    ElementPlus.ElMessage.success('已清空购物车')
                }).catch(() => {})
            }

            const updateCart = () => {}

            const handleSuspend = () => {
                if (cartItems.value.length === 0) {
                    ElementPlus.ElMessage.warning('购物车为空，无需挂单')
                    return
                }
                localStorage.setItem('suspendedOrder', JSON.stringify(cartItems.value))
                ElementPlus.ElMessage.success('已挂单，可在取单中恢复')
                cartItems.value = []
            }

            const handleRecall = () => {
                const data = localStorage.getItem('suspendedOrder')
                if (data) {
                    cartItems.value = JSON.parse(data)
                    localStorage.removeItem('suspendedOrder')
                    ElementPlus.ElMessage.success('已取回挂单')
                } else {
                    ElementPlus.ElMessage.warning('没有挂单记录')
                }
            }

            const handleCheckout = () => {
                if (cartItems.value.length === 0) {
                    ElementPlus.ElMessage.warning('购物车为空，请先添加商品')
                    return
                }
                paymentDialogVisible.value = true
            }

            const handlePay = (method) => {
                paymentDialogVisible.value = false
                ElementPlus.ElMessage.success(`支付成功！方式：${method}，金额：¥${totalAmount.value.toFixed(2)}`)
                console.log('打印小票:', cartItems.value)
                cartItems.value = []
            }

            // ============================================================
            //  🚪 退出登录
            // ============================================================
            const handleLogout = () => {
                ElementPlus.ElMessageBox.confirm('确认退出收银系统？', '提示', {
                    confirmButtonText: '确认退出',
                    cancelButtonText: '取消',
                    type: 'warning'
                }).then(() => {
                    // 清除登录状态
                    localStorage.removeItem('isLoggedIn')
                    localStorage.removeItem('username')
                    ElementPlus.ElMessage.success('已安全退出')
                    // 跳回登录页
                    setTimeout(() => {
                        window.location.href = '/supermarket_web/pos/'
                    }, 500)
                }).catch(() => {})
            }

            // ===== 键盘快捷键 =====
            const handleKeydown = (e) => {
                if (e.key === 'F1') {
                    e.preventDefault()
                    document.querySelector('.search-area input')?.focus()
                }
                if (e.key === 'F2') {
                    e.preventDefault()
                    handleSuspend()
                }
                if (e.key === 'F3') {
                    e.preventDefault()
                    handleCheckout()
                }
            }

            // ===== 生命周期 =====
            onMounted(() => {
                loadProducts()
                window.addEventListener('keydown', handleKeydown)
            })
            onUnmounted(() => {
                window.removeEventListener('keydown', handleKeydown)
            })

            return {
                username,
                searchKeyword,
                productList,
                currentPage,
                total,
                cartItems,
                paymentDialogVisible,
                totalQuantity,
                totalAmount,
                loadProducts,
                handleSearch,
                handleAddBySearch,
                handleAddToCart,
                handleRemoveFromCart,
                handleClearCart,
                updateCart,
                handleSuspend,
                handleRecall,
                handleCheckout,
                handlePay,
                handleLogout
            }
        }
    })

    // 使用 Element Plus
    app.use(ElementPlus)
    app.mount('#app')
</script>

</body>
</html>
