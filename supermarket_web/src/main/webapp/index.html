<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录测试</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #1a3a5c; margin-bottom: 8px; }
        p.sub { text-align: center; color: #909399; margin-top: -4px; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #dcdfe6;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #2d6a9f;
        }
        .captcha-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }
        .captcha-row input {
            flex: 1;
            margin-bottom: 0;
        }
        .captcha-box {
            width: 120px;
            height: 44px;
            background: #f0f2f5;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #2d6a9f;
            cursor: pointer;
            border: 2px solid #dcdfe6;
            user-select: none;
            flex-shrink: 0;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2d6a9f, #4a90d9);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #f56c6c; text-align: center; margin-top: 8px; min-height: 24px; font-size: 14px; }
        .success { color: #67c23a; text-align: center; margin-top: 8px; min-height: 24px; font-size: 14px; }
        .debug {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 13px;
            color: #606266;
            border: 1px solid #ddd;
        }
        .debug pre { margin: 4px 0; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

<div class="login-box">
    <h1>🏪 智慧超市</h1>
    <p class="sub">登录测试页面</p>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>

    <form id="loginForm">
        <input type="text" id="username" placeholder="用户名 (admin)" value="admin">
        <input type="password" id="password" placeholder="密码 (123456)" value="123456">
        <div class="captcha-row">
            <input type="text" id="captcha" placeholder="验证码" maxlength="4">
            <div class="captcha-box" id="captchaBox">A3B9</div>
        </div>
        <button type="submit" id="loginBtn">登 录</button>
    </form>

    <div class="debug" id="debugInfo">
        <strong>🔍 调试信息：</strong>
        <pre id="debugContent">等待登录...</pre>
    </div>
</div>

<script>
    // ===== 验证码 =====
    let captchaText = 'A3B9';

    function generateCaptcha() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let result = '';
        for (let i = 0; i < 4; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        captchaText = result;
        document.getElementById('captchaBox').textContent = result;
    }

    document.getElementById('captchaBox').addEventListener('click', generateCaptcha);

    // ===== 登录 =====
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const captcha = document.getElementById('captcha').value.trim();
        const errorEl = document.getElementById('error');
        const successEl = document.getElementById('success');
        const debugEl = document.getElementById('debugContent');
        const btn = document.getElementById('loginBtn');

        errorEl.textContent = '';
        successEl.textContent = '';
        debugEl.textContent = '';

        // 验证验证码
        if (captcha.toUpperCase() !== captchaText.toUpperCase()) {
            errorEl.textContent = '⚠️ 验证码错误';
            generateCaptcha();
            return;
        }

        btn.disabled = true;
        btn.textContent = '登录中...';

        // 构建请求
        const contextPath = window.location.pathname.split('/')[1] || 'supermarket_web';
        const url = '/' + contextPath + '/login';

        debugEl.textContent = '📡 发送请求到: ' + url + '\n';
        debugEl.textContent += '👤 用户名: ' + username + '\n';
        debugEl.textContent += '🔑 密码: ' + password;

        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: 'username=' + encodeURIComponent(username) +
                  '&password=' + encodeURIComponent(password)
        })
        .then(response => {
            debugEl.textContent += '\n📥 响应状态: ' + response.status + ' ' + response.statusText;
            return response.json();
        })
        .then(data => {
            debugEl.textContent += '\n📦 响应数据: ' + JSON.stringify(data, null, 2);
            btn.disabled = false;
            btn.textContent = '登 录';

            if (data.success) {
                successEl.textContent = '✅ ' + data.message + '，正在跳转...';
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', username);
                setTimeout(function() {
                    window.location.href = '/' + contextPath + '/index.jsp';
                }, 1000);
            } else {
                errorEl.textContent = '❌ ' + data.message;
                generateCaptcha();
            }
        })
        .catch(error => {
            debugEl.textContent += '\n❌ 网络错误: ' + error.message;
            btn.disabled = false;
            btn.textContent = '登 录';
            errorEl.textContent = '❌ 网络错误，请检查服务器是否启动';
            generateCaptcha();
        });
    });

    // 页面加载时生成验证码
    generateCaptcha();
</script>

</body>
</html>
